name: Multiple Jobs Example

on:
  push:
    branches:
      - main

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - name: Print Message
        run: echo "This is Job 1"

      - name: Show Date
        run: date

  job2:
    runs-on: ubuntu-latest

    steps:
      - name: Print Message
        run: echo "This is Job 2"

      - name: Show Current Directory
        run: pwd
